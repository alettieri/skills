name: default-herdr-issue-workflow
version: 1
type: herdr.issue
start: setup

roleDefaults:
  agent: codex
  reuse: true
  codex:
    approval: on-request
    sandbox: workspace-write
  claude:
    permissionMode: auto

roles:
  implementer:
    label: implementer
    agentNameTemplate: issue-{{ issue.slug }}-implementer
    model: gpt-5.4-mini
    resultSchemas:
      - implementer-result-v1
  simplifier:
    label: simplifier
    agentNameTemplate: issue-{{ issue.slug }}-simplifier
    model: gpt-5.4-mini
    resultSchemas:
      - simplifier-result-v1
  reviewer:
    label: reviewer
    agentNameTemplate: issue-{{ issue.slug }}-reviewer
    model: gpt-5.5
    resultSchemas:
      - reviewer-result-v1
  verifier:
    label: verifier
    agentNameTemplate: issue-{{ issue.slug }}-verifier
    model: gpt-5.5
    resultSchemas:
      - verifier-result-v1

phases:
  setup:
    type: herdr-worktree
    on:
      success: post_worktree_setup
      blocked: blocked
      failure: failed

  post_worktree_setup:
    type: script
    command: workflow-scripts/post-worktree-setup.sh
    on:
      success: implement
      skipped: implement
      blocked: blocked
      failure: failed
      timeout: blocked

  implement:
    type: agent
    role: implementer
    promptTemplate: implement.md
    resultSchema: implementer-result-v1
    on:
      complete: simplify
      blocked: blocked
      failed: failed

  simplify:
    type: agent
    role: simplifier
    promptTemplate: simplify.md
    resultSchema: simplifier-result-v1
    on:
      complete: review
      no_changes: review
      blocked: blocked
      failed: failed

  review:
    type: agent
    role: reviewer
    promptTemplate: review.md
    resultSchema: reviewer-result-v1
    on:
      approved: verify
      needs_fix: fix
      blocked: blocked
      failed: failed

  fix:
    type: agent
    role: implementer
    promptTemplate: fix.md
    resultSchema: implementer-result-v1
    on:
      complete: simplify
      blocked: blocked
      failed: failed

  verify:
    type: agent
    role: verifier
    promptTemplate: verify.md
    resultSchema: verifier-result-v1
    on:
      complete: run_checks
      needs_fix: fix
      blocked: blocked
      failed: failed

  run_checks:
    type: script
    command: workflow-scripts/run-checks.sh
    on:
      success: commit_changes
      no_checks: commit_changes
      checks_failed: fix
      blocked: blocked
      failure: failed
      timeout: blocked

  commit_changes:
    type: script
    command: workflow-scripts/commit-changes.sh
    on:
      success: push_branch
      no_changes: blocked
      failure: failed

  push_branch:
    type: script
    command: workflow-scripts/push-branch.sh
    on:
      success: create_pr
      failure: failed
      blocked: blocked

  create_pr:
    type: script
    command: workflow-scripts/create-pr.sh
    on:
      success: await_review
      existing: await_review
      failure: failed
      blocked: blocked

  await_review:
    type: poll
    command: workflow-scripts/check-pr-review.sh
    args:
      - '{{ context.pr_url }}'
      - '{{ context.pr_number }}'
    intervalSeconds: 60
    on:
      approved: await_merge
      changes_requested: handle_pr_feedback
      checks_failed: handle_pr_feedback
      feedback: handle_pr_feedback
      waiting: await_review
      closed: pr_closed
      timeout: blocked
      failure: failed

  handle_pr_feedback:
    type: agent
    role: implementer
    promptTemplate: handle-pr-feedback.md
    resultSchema: implementer-result-v1
    on:
      complete: simplify
      blocked: blocked
      failed: failed

  await_merge:
    type: poll
    command: workflow-scripts/check-pr-merged.sh
    args:
      - '{{ context.pr_url }}'
      - '{{ context.pr_number }}'
    intervalSeconds: 60
    on:
      merged: cleanup
      feedback: handle_pr_feedback
      checks_failed: handle_pr_feedback
      waiting: await_merge
      closed: pr_closed
      timeout: blocked
      failure: failed

  cleanup:
    type: script
    command: workflow-scripts/cleanup-worktree.sh
    on:
      success: complete
      cleanup_failed: cleanup_failed
      failure: cleanup_failed

  complete:
    type: terminal
    status: complete

  pr_closed:
    type: terminal
    status: closed

  blocked:
    type: terminal
    status: blocked

  failed:
    type: terminal
    status: failed

  cleanup_failed:
    type: terminal
    status: cleanup_failed
